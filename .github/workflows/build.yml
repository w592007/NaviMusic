name: Build NaviMusic APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout (git clone)
        run: |
          git clone --depth 1 https://github.com/w592007/NaviMusic.git .
          sed -i 's/\r$//' gradlew
          chmod +x gradlew

      - name: Install JDK 17
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y openjdk-17-jdk

      - name: Setup Java environment
        run: |
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          export PATH=$JAVA_HOME/bin:$PATH
          echo "JAVA_HOME=$JAVA_HOME" >> $GITHUB_ENV
          echo "PATH=$PATH" >> $GITHUB_ENV
          java -version

      - name: Setup Android SDK
        run: |
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          export PATH=$JAVA_HOME/bin:$PATH
          ANDROID_HOME=$HOME/android-sdk
          mkdir -p $ANDROID_HOME/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O /tmp/cmdline.zip
          unzip -q /tmp/cmdline.zip -d $ANDROID_HOME/cmdline-tools
          mv $ANDROID_HOME/cmdline-tools/cmdline-tools $ANDROID_HOME/cmdline-tools/latest
          chmod +x $ANDROID_HOME/cmdline-tools/latest/bin/*
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> $GITHUB_ENV
          echo "$ANDROID_HOME/cmdline-tools/latest/bin:$JAVA_HOME/bin" >> $GITHUB_PATH
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Build Debug APK
        run: |
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          export ANDROID_HOME=$HOME/android-sdk
          export PATH=$JAVA_HOME/bin:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH
          java -version
          which java
          which sdkmanager
          bash gradlew assembleDebug --no-daemon

      - name: Upload APK via curl
        if: success()
        run: |
          APK="app/build/outputs/apk/debug/app-debug.apk"
          ls -la "$APK" || { echo "APK not found!"; exit 1; }
          echo "APK built successfully!"
          curl -F "file=@$APK" https://tmpfiles.org/api/v1/upload
